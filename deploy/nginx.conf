server {
    listen 80;
    server_name onduran.com.tr www.onduran.com.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name onduran.com.tr www.onduran.com.tr;

    ssl_certificate     /etc/letsencrypt/live/onduran.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onduran.com.tr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Django static dosyaları
    location /static/ {
        alias /var/www/ondur/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media dosyaları
    location /media/ {
        alias /var/www/ondur/media/;
        expires 7d;
    }

    # Django API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React SPA — tüm diğer istekler
    location / {
        root  /var/www/ondur/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
