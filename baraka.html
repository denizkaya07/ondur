<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reçete Yaz — Sera Reçete Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f0;
  --surface: #fff;
  --border: #e2e8e2;
  --text: #0f1f0f;
  --muted: #6b8f6b;
  --accent: #16a34a;
  --accent-light: #dcfce7;
  --accent-dark: #15803d;
  --blue: #0ea5e9;
  --blue-light: #e0f2fe;
  --orange: #f59e0b;
  --orange-light: #fef3c7;
  --red: #ef4444;
  --red-light: #fee2e2;
  --shadow: 0 1px 4px rgba(0,0,0,.07);
  --shadow-md: 0 4px 20px rgba(0,0,0,.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 28px;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title { font-size: 13px; font-weight: 700; }

/* ── FORM ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { margin-bottom: 0; }
.form-group.full { grid-column: 1 / -1; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
}
.form-control {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  color: var(--text);
  background: var(--surface);
  transition: border-color .15s;
}
.form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(22,163,74,.1); }
textarea.form-control { resize: vertical; min-height: 70px; }
select.form-control { cursor: pointer; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: all .15s;
  font-family: inherit;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-dark); }
.btn.lg { padding: 11px 22px; font-size: 13px; border-radius: 10px; }
.btn.danger { color: var(--red); border-color: var(--red-light); }
.btn.danger:hover { background: var(--red-light); }

.clr-btn {
  flex-shrink: 0;
  width: 20px;
  height: 26px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 12px;
  color: #ccc;
  padding: 0;
  line-height: 1;
  border-radius: 4px;
  transition: color .15s, background .15s;
}
.clr-btn:hover { color: var(--red); background: var(--red-light); }

/* ── SELECTION BAR ── */
.selection-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: var(--shadow);
  flex-wrap: wrap;
}
.sel-item { display: flex; align-items: center; gap: 8px; }
.sel-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  display: block;
  margin-bottom: 2px;
}
.sel-val { font-size: 13px; font-weight: 700; }
.sel-sep { width: 1px; height: 36px; background: var(--border); }

.farmer-av {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: var(--accent-light);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  flex-shrink: 0;
}

/* ── PERIOD BLOCKS ── */
.period-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 12px;
}
.period-header {
  padding: 11px 16px;
  background: #f0faf4;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.period-title { font-size: 13px; font-weight: 700; color: var(--accent); }
.period-footer {
  padding: 10px 14px;
  border-top: 1px dashed var(--border);
  background: #fafcfa;
}

.period-table { width: 100%; border-collapse: collapse; }
.period-table th {
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-align: left;
  background: #fafbfa;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: .4px;
}
.period-table td {
  padding: 9px 10px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.period-table tr:last-child td { border-bottom: none; }
.period-table tr:hover td { background: #fafcfa; }

/* ── SUCCESS ── */
.success-screen { text-align: center; padding: 48px 24px; }
.success-icon {
  width: 72px;
  height: 72px;
  background: var(--accent-light);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 20px;
}
.success-screen h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.success-screen p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.rec-no {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  background: var(--accent-light);
  color: var(--accent);
  padding: 8px 20px;
  border-radius: 10px;
  margin-bottom: 24px;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: 16px;
  width: 580px;
  max-width: 95vw;
  max-height: 82vh;
  overflow-y: auto;
  padding: 26px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-title { font-size: 17px; font-weight: 800; margin-bottom: 18px; }
.modal-close {
  float: right;
  cursor: pointer;
  background: #f3f4f6;
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 15px;
  line-height: 28px;
  text-align: center;
}
.recete-preview { font-size: 11px; line-height: 1.8; }
.recete-hdr { background: #f0faf4; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
.rec-tbl { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
.rec-tbl th { background: var(--accent); color: #fff; padding: 6px 10px; text-align: left; font-size: 10px; }
.rec-tbl td { padding: 6px 10px; border-bottom: 1px solid #e5e7eb; font-size: 10px; }
.rec-tbl tr:nth-child(even) td { background: #f9fafb; }

/* ── STEP VIEWS ── */
.step-view { display: none; }
.step-view.active { display: block; animation: fadeIn .22s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── BOTTOM NAV ── */
.bottom-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 0;
  margin-top: 16px;
}
</style>
</head>

  'Azoter WP':              { type:'Biyolojik',  active:'Azotobacter chroococcum',             dose:'2',    unit:'gr',    base:'dekar', method:'Toprak' },
  'JumpStart WS':           { type:'Biyolojik',  active:'Penicillium bilaiae',                 dose:'1',    unit:'gr',    base:'dekar', method:'Toprak' },
  'Nativo Bio WP':          { type:'Biyolojik',  active:'Bacillus subtilis + Tebuconazole',    dose:'1.5',  unit:'gr',    base:'100L',  method:'Yapraktan' },
  'Stimplex SL':            { type:'Biyolojik',  active:'Ascophyllum nodosum Özü',             dose:'2',    unit:'ml/cc', base:'100L',  method:'Yapraktan' },
  'Lalstop G77 WG':         { type:'Biyolojik',  active:'Aureobasidium pullulans',             dose:'1',    unit:'gr',    base:'100L',  method:'Yapraktan' },
  'Thripobugline WP':       { type:'Biyolojik',  active:'Amblyseius cucumeris',                dose:'0.5',  unit:'gr',    base:'dekar', method:'Yapraktan' },
};

// ─── SETUP ───
function setupPrescription() {
  const today = new Date();
  const d = String(today.getDate()).padStart(2, '0');
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const y = String(today.getFullYear()).slice(2);
  const rand = Math.random().toString(36).slice(2, 6).toUpperCase();
  const recNo = `REC-${d}${m}${y}-${rand}`;
  document.getElementById('rec-no-display').textContent = recNo;
  document.getElementById('success-rec-no').textContent = recNo;
  state.recNo = recNo;

  // Tanı alanı varsayılanı
  const diagEl = document.getElementById('pr-diagnosis');
  if (!diagEl.value) diagEl.value = 'Normal';

  // Takip tarihi: +14 gün
  const fup = new Date();
  fup.setDate(fup.getDate() + 14);
  document.getElementById('pr-followup').value = fup.toISOString().split('T')[0];

  // Dikim tarihi göstergesi
  const pdEl = document.getElementById('sel-gh-plantdate2');
  if (pdEl && state.greenhouse.plantDate) {
    const planted = new Date(state.greenhouse.plantDate);
    const days = Math.floor((today - planted) / 86400000);
    const dateStr = planted.toLocaleDateString('tr-TR');
    pdEl.innerHTML = `${dateStr} <span style="background:var(--accent);color:#fff;font-size:13px;font-weight:800;padding:3px 10px;border-radius:20px;margin-left:6px;vertical-align:middle;">${days} gün</span>`;
  }

  // Başlangıçta bir sulama dönemi aç
  if (state.periods.length === 0) {
    state.periodCount = 0;
    document.getElementById('periods-container').innerHTML = '';
    addPeriod();
  }
}

// ─── SULAMA DÖNEMİ EKLE ───
function addPeriod() {
  state.periodCount++;
  const pc = state.periodCount;
  const container = document.getElementById('periods-container');
  const div = document.createElement('div');
  div.className = 'period-block';
  div.id = `period-block-${pc}`;
  div.innerHTML = `
    <div class="period-header">
      <span class="period-title">💧 ${pc}. Sulama Dönemi</span>
      ${pc > 1 ? `<button class="btn danger" style="padding:4px 10px;font-size:11px;" onclick="removePeriod(${pc})">✕ Dönemi Sil</button>` : ''}
    </div>
    <table class="period-table">
      <thead>
        <tr>
          <th style="min-width:160px;">Gübre / İlaç</th>
          <th>Tür</th>
          <th>Etken Madde</th>
          <th style="width:140px;">Doz / Birim / Baz</th>
          <th style="width:90px;">Sera Toplam</th>
          <th>Uygulama</th>
          <th style="width:36px;"></th>
        </tr>
      </thead>
      <tbody id="period-body-${pc}"></tbody>
    </table>
    <div class="period-footer" id="period-footer-${pc}">
      <button class="btn" style="font-size:12px;color:var(--accent);border-color:var(--accent-light);background:var(--accent-light);"
              onclick="addMedRow(${pc})">+ İlaç / Gübre Ekle</button>
    </div>`;
  container.appendChild(div);
  addMedRow(pc);
  state.periods.push({ id: pc, rows: [] });
}

function removePeriod(pc) {
  document.getElementById(`period-block-${pc}`)?.remove();
}

// ─── YARDIMCI FONKSİYONLAR ───
function medNamesForType(type) {
  return Object.keys(MEDICINE_DB).filter(k => !type || MEDICINE_DB[k].type === type);
}

function updateMedDatalist(rowId, type) {
  const dl = document.getElementById(`dl-${rowId}`);
  if (!dl) return;
  dl.innerHTML = medNamesForType(type).map(n => `<option value="${n}">`).join('');
}

function updateActiveDatalist(rowId, type) {
  const dl = document.getElementById(`dla-${rowId}`);
  if (!dl) return;
  const actives = [...new Set(medNamesForType(type).map(n => MEDICINE_DB[n].active))];
  dl.innerHTML = actives.map(a => `<option value="${a}">`).join('');
}

// ─── İLAÇ SATIRI EKLE ───
function addMedRow(pc) {
  const tbody = document.getElementById(`period-body-${pc}`);
  if (!tbody) return;
  const rowId = `med-${pc}-${Date.now()}`;
  const tr = document.createElement('tr');
  tr.id = rowId;
  tr.innerHTML = `
    <td style="min-width:160px;">
      <div style="display:flex;gap:3px;align-items:center;">
        <input class="form-control med-name" style="padding:5px 8px;flex:1;" placeholder="İlaç/gübre adı…"
               list="dl-${rowId}" oninput="autoFillMed(this,'${rowId}')">
        <button type="button" class="clr-btn" onclick="clearMedRow('${rowId}')" title="Tümünü temizle">✕</button>
      </div>
      <datalist id="dl-${rowId}"></datalist>
    </td>
    <td>
      <div style="display:flex;gap:2px;align-items:center;">
        <select class="form-control med-type" style="padding:5px 6px;width:90px;"
                onchange="onTypeChange(this,'${rowId}')">
          <option value="">— Tür —</option>
          <option>Fungisit</option>
          <option>İnsektisit</option>
          <option>Akarisit</option>
          <option>Herbisit</option>
          <option>Gübre</option>
          <option>Biyolojik</option>
        </select>
        <button type="button" class="clr-btn" onclick="clearMedType('${rowId}')" title="Türü temizle">✕</button>
      </div>
    </td>
    <td>
      <div style="display:flex;gap:2px;align-items:center;">
        <input class="form-control med-active" style="padding:5px 6px;flex:1;" placeholder="Etken madde"
               list="dla-${rowId}" oninput="onActiveInput(this,'${rowId}')">
        <button type="button" class="clr-btn" onclick="clearMedActive('${rowId}')" title="Etken maddeyi temizle">✕</button>
      </div>
      <datalist id="dla-${rowId}"></datalist>
    </td>
    <td>
      <div style="display:flex;gap:3px;align-items:center;flex-wrap:nowrap;">
        <input class="form-control med-dose" style="padding:5px 6px;width:52px;" placeholder="—"
               oninput="calcSeraTotal('${rowId}')"
               onfocus="this.value='';const h=document.getElementById('std-hint-${rowId}');if(h)h.style.display='none'"
               onblur="if(!this.value&&this.placeholder&&this.placeholder!=='—'){this.value=this.placeholder}">
        <select class="form-control med-unit" style="padding:4px 3px;width:46px;font-size:11px;"
                onchange="calcSeraTotal('${rowId}')">
          <option>ml/cc</option>
          <option>gr</option>
          <option>L</option>
          <option>kg</option>
        </select>
        <select class="form-control med-base" style="padding:4px 3px;width:100px;font-size:10px;color:var(--muted);"
                onchange="calcSeraTotal('${rowId}')">
          <option value="100L">/ 100 L suya</option>
          <option value="1000L">/ ton suya</option>
          <option value="dekar">/ dekar</option>
          <option value="m2">/ m²</option>
          <option value="sabit">sabit miktar</option>
        </select>
      </div>
      <div id="std-hint-${rowId}" style="display:none;font-size:9px;color:#aaa;margin-top:2px;"></div>
    </td>
    <td>
      <input class="form-control med-total" style="padding:5px 8px;width:90px;background:#f9fafb;"
             placeholder="—" readonly>
    </td>
    <td>
      <select class="form-control med-method" style="padding:5px 8px;width:110px;">
        <option>Yapraktan</option>
        <option>Damla</option>
        <option>Sulama Suyu</option>
        <option>Toprak</option>
      </select>
    </td>
    <td>
      <button class="btn danger" style="padding:3px 8px;font-size:11px;"
              onclick="this.closest('tr').remove()">✕</button>
    </td>`;
  tbody.appendChild(tr);
  updateMedDatalist(rowId, '');
  updateActiveDatalist(rowId, '');
}

// ─── OLAY YÖNETİCİLERİ ───

// Tür değişince: ilaç ve etken madde listelerini filtrele, alanları temizle
function onTypeChange(selectEl, rowId) {
  const type = selectEl.value;
  const tr = document.getElementById(rowId);
  if (!tr) return;
  updateMedDatalist(rowId, type);
  updateActiveDatalist(rowId, type);
  tr.querySelector('.med-name').value   = '';
  tr.querySelector('.med-active').value = '';
  tr.querySelector('.med-dose').value   = '';
  tr.querySelector('.med-total').value  = '—';
  const hint = document.getElementById(`std-hint-${rowId}`);
  if (hint) hint.style.display = 'none';
  flash(selectEl);
}

// Etken madde girilince: eşleşen ilacı bul ve diğer alanları otomatik doldur
function onActiveInput(input, rowId) {
  const active = input.value.trim();
  const tr = document.getElementById(rowId);
  if (!tr) return;
  const filterType = tr.querySelector('.med-type').value || '';
  const match = Object.entries(MEDICINE_DB).find(([n, m]) =>
    m.active === active && (!filterType || m.type === filterType)
  );
  if (match) {
    const [name, med] = match;
    tr.querySelector('.med-name').value = name;
    applyMed(rowId, med);
  }
}

// İlaç adı girilince: veritabanından bilgileri otomatik doldur
function autoFillMed(input, rowId) {
  const name = input.value.trim();
  const med = MEDICINE_DB[name];
  if (med) applyMed(rowId, med);
  calcSeraTotal(rowId);
}

// Veritabanı kaydını satıra uygula
function applyMed(rowId, med) {
  const tr = document.getElementById(rowId);
  if (!tr) return;
  const typeEl   = tr.querySelector('.med-type');
  const activeEl = tr.querySelector('.med-active');
  const doseEl   = tr.querySelector('.med-dose');
  const unitEl   = tr.querySelector('.med-unit');
  const baseEl   = tr.querySelector('.med-base');
  const methodEl = tr.querySelector('.med-method');
  const hintEl   = document.getElementById(`std-hint-${rowId}`);

  Array.from(typeEl.options).forEach((o, i) => { if (o.text === med.type) typeEl.selectedIndex = i; });
  activeEl.value     = med.active;
  doseEl.value       = med.dose;
  doseEl.placeholder = med.dose;
  doseEl.title       = `Standart doz: ${med.dose} ${med.unit}`;

  if (unitEl) Array.from(unitEl.options).forEach((o, i) => { if (o.value === med.unit || o.text === med.unit) unitEl.selectedIndex = i; });
  if (baseEl) baseEl.value = med.base || '100L';
  Array.from(methodEl.options).forEach((o, i) => { if (o.text === med.method) methodEl.selectedIndex = i; });

  const baseLabel = baseEl ? baseEl.options[baseEl.selectedIndex]?.text : '100 L';
  if (hintEl) { hintEl.textContent = `std: ${med.dose} ${med.unit} / ${baseLabel}`; hintEl.style.display = 'block'; }

  updateMedDatalist(rowId, med.type);
  updateActiveDatalist(rowId, med.type);
  [typeEl, activeEl, doseEl, unitEl, methodEl].forEach(flash);
  calcSeraTotal(rowId);
}

function clearMedRow(rowId) {
  const tr = document.getElementById(rowId);
  if (!tr) return;
  tr.querySelector('.med-name').value   = '';
  tr.querySelector('.med-active').value = '';
  tr.querySelector('.med-dose').value   = '';
  tr.querySelector('.med-total').value  = '—';
  const typeEl = tr.querySelector('.med-type');
  if (typeEl) typeEl.selectedIndex = 0;
  const hintEl = document.getElementById('std-hint-' + rowId);
  if (hintEl) hintEl.style.display = 'none';
  updateMedDatalist(rowId, '');
  updateActiveDatalist(rowId, '');
  tr.querySelector('.med-name').focus();
}

function clearMedType(rowId) {
  const tr = document.getElementById(rowId);
  if (!tr) return;
  const typeEl = tr.querySelector('.med-type');
  if (typeEl) typeEl.selectedIndex = 0;
  updateMedDatalist(rowId, '');
  updateActiveDatalist(rowId, '');
}

function clearMedActive(rowId) {
  const tr = document.getElementById(rowId);
  if (!tr) return;
  const el = tr.querySelector('.med-active');
  if (el) { el.value = ''; el.focus(); }
}

// Yeşil flash animasyonu (otomatik doldurma geri bildirimi)
function flash(el) {
  if (!el) return;
  el.style.background = '#f0faf4';
  setTimeout(() => el.style.background = '', 1200);
}

// ─── SERA TOPLAM HESAPLA ───
// Su hacmi tahmini: 0.8 L/m²
function calcSeraTotal(rowId) {
  const tr = document.getElementById(rowId);
  if (!tr) return;
  const dose    = parseFloat(tr.querySelector('.med-dose')?.value);
  const baseEl  = tr.querySelector('.med-base');
  const base    = baseEl ? baseEl.value : '100L';
  const unitEl  = tr.querySelector('.med-unit');
  const unit    = unitEl ? unitEl.value : 'ml';
  const totalEl = tr.querySelector('.med-total');
  if (!totalEl) return;

  const areaRaw   = state.greenhouse?.area || '';
  const areaSm    = parseFloat(areaRaw.replace(/\./g, '').replace(',', '.')) || 0; // m²
  const areaDekar = areaSm / 1000; // 1 dekar = 1000 m²

  if (!dose || !areaSm) { totalEl.value = '—'; return; }

  const totalWaterL = areaSm * 0.8; // toplam su hacmi (L)

  let total = 0;
  switch (base) {
    case '100L':  total = dose * (totalWaterL / 100); break;
    case '1000L': total = dose * (totalWaterL / 1000); break;
    case 'dekar': total = dose * areaDekar; break;
    case 'm2':    total = dose * areaSm; break;
    case 'sabit': total = dose; break;
    default:      total = dose * (totalWaterL / 100);
  }

  const isWeight = ['gr', 'kg'].includes(unit);
  let display = '';
  if (isWeight) {
    display = total >= 1000 ? (total / 1000).toFixed(2) + ' kg' : total.toFixed(1) + ' gr';
  } else {
    display = total >= 1000 ? (total / 1000).toFixed(2) + ' L' : total.toFixed(1) + ' ml/cc';
  }
  totalEl.value = display;
}

// ─── KAYDET & BİTİR ───
function saveAndFinish() {
  const diagEl = document.getElementById('pr-diagnosis');
  if (!diagEl.value.trim()) diagEl.value = 'Normal';
  document.getElementById('success-desc').textContent =
    `${state.farmer.name} — ${state.greenhouse.name} için reçete oluşturuldu.`;
  showStep(4);
}

function showStep(n) {
  document.querySelectorAll('.step-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`step-${n}`)?.classList.add('active');
}

function resetForm() {
  state.periods = [];
  state.periodCount = 0;
  document.getElementById('periods-container').innerHTML = '';
  document.getElementById('pr-diagnosis').value = '';
  document.getElementById('pr-notes').value = '';
  showStep(3);
  setupPrescription();
}

// ─── PDF MODALİ ───
function openPdfModal() {
  const gh     = state.greenhouse;
  const farmer = state.farmer;
  const diag   = document.getElementById('pr-diagnosis')?.value || '—';
  const recNo  = state.recNo || 'REC-AUTO';
  const today  = new Date().toLocaleDateString('tr-TR');

  // Dönem tablolarını topla
  let periodsHtml = '';
  for (let i = 1; i <= state.periodCount; i++) {
    const tbody = document.getElementById(`period-body-${i}`);
    if (!tbody) continue;
    const rows = Array.from(tbody.querySelectorAll('tr'));
    if (!rows.length) continue;
    let rowsHtml = rows.map(r => {
      const cells = r.querySelectorAll('input, select');
      const vals  = Array.from(cells).map(c => c.value || '—');
      // vals: [0]=ad, [1]=doz, [2]=birim, [3]=baz, [4]=toplam, [5]=uygulama
      return `<tr>
        <td>${vals[0]}</td>
        <td>${vals[1]} ${vals[2]} ${vals[3]}</td>
        <td>${vals[4]}</td>
        <td>${vals[5]}</td>
      </tr>`;
    }).join('');
    periodsHtml += `
      <div style="font-weight:700;font-size:11px;margin-bottom:4px;color:var(--accent);">💧 ${i}. Sulama Dönemi</div>
      <table class="rec-tbl">
        <thead><tr><th>İlaç/Gübre</th><th>Doz</th><th>Sera Toplam</th><th>Uygulama</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>`;
  }
  if (!periodsHtml) periodsHtml = '<div style="color:#aaa;font-size:12px;padding:10px 0;">Sulama dönemi eklenmedi.</div>';

  document.getElementById('pdf-preview-content').innerHTML = `
    <div class="recete-hdr">
      <div style="font-size:14px;font-weight:800;margin-bottom:6px;">🌿 SERA REÇETESİ</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px;">
        <div><b>Reçete No:</b> ${recNo}</div>
        <div><b>Tarih:</b> ${today}</div>
        <div><b>Çiftçi:</b> ${farmer.name}</div>
        <div><b>Tel:</b> ${farmer.phone || '—'}</div>
        <div><b>Sera:</b> ${gh.name}</div>
        <div><b>Alan:</b> ${gh.area} m²</div>
        <div><b>Ürün:</b> ${gh.crop || '—'}</div>
        <div><b>Takip:</b> ${document.getElementById('pr-followup')?.value || '—'}</div>
      </div>
    </div>
    <div style="background:#fef2f2;padding:8px;border-radius:6px;font-size:11px;margin-bottom:12px;border-left:3px solid #ef4444;">
      <b>Tanı:</b> ${diag}
    </div>
    ${periodsHtml}
    <div style="border-top:1px solid #e5e7eb;margin-top:12px;padding-top:8px;font-size:10px;color:#888;display:flex;justify-content:space-between;">
      <span>Ziraat Mühendisi: Ahmet Yılmaz</span>
      <span>İmza: ________________</span>
    </div>`;

  document.getElementById('pdf-modal').classList.add('open');
}

function closePdf() {
  document.getElementById('pdf-modal').classList.remove('open');
}

// ─── BAŞLAT ───
setupPrescription();
</script>
